name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Repo
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: samples/dotnet-hello-world/packages.lock.json

      - name: Validate shell scripts
        run: bash -n hack/*.sh

      - name: Validate JSON files
        run: |
          python3 -m json.tool .devcontainer/devcontainer.json >/dev/null
          python3 -m json.tool infra/aks/main.json >/dev/null
          python3 -m json.tool samples/aks-smoke/.devcontainer/devcontainer.json >/dev/null
          python3 -m json.tool samples/dotnet-hello-world/.devcontainer/devcontainer.json >/dev/null

      - name: Restore sample app
        run: dotnet restore --locked-mode samples/dotnet-hello-world/HelloWorld.csproj

      - name: Build sample app
        run: dotnet build --no-restore --configuration Release samples/dotnet-hello-world/HelloWorld.csproj
